function validateBodyText() {
  var el = document.getElementById('f_body');
  var errEl = document.getElementById('f_body_err');
  if (!el || !errEl) return;
  var len = el.value.length;
  if (len > 200) {
    errEl.textContent = '200文字を超えています（現在' + len + '文字）';
    el.classList.add('finput-invalid');
  } else {
    errEl.textContent = len > 180 ? (200 - len) + '文字まで入力できます' : '';
    el.classList.remove('finput-invalid');
  }
}

function validateAddrInput(id) {
  var el = document.getElementById(id);
  var errEl = document.getElementById(id + '_err');
  if (!el || !errEl) return;

  // 全角数字→半角・全角ハイフン→半角（両フィールド共通で自動変換）
  var converted = el.value
    .replace(/[０-９]/g, function(c) { return String.fromCharCode(c.charCodeAt(0) - 0xFEE0); })
    .replace(/－/g, '-');
  if (converted !== el.value) {
    var pos = el.selectionStart;
    el.value = converted;
    try { el.setSelectionRange(pos, pos); } catch(e) {}
  }

  if (id === 'f_addr1') {
    // 住所1：長音符（ー）が残っている場合はエラー
    if (/ー/.test(el.value)) {
      errEl.textContent = '番地の数字とハイフンは半角で入力してください（例：3-17-20）';
      el.classList.add('finput-invalid');
    } else {
      errEl.textContent = '';
      el.classList.remove('finput-invalid');
    }
  } else {
    // 住所2：バリデーションエラーなし
    errEl.textContent = '';
    el.classList.remove('finput-invalid');
  }
}

function getFormData() {
  var tags = [].slice.call(document.querySelectorAll('.tcb:checked')).map(function(c){ return c.value; });
  var rl   = document.querySelector('input[name="rl"]:checked');

  // カテゴリ別のタグ情報を収集（カスタムタグの色を保持するため）
  var tagCategories = {};
  TAG_CATEGORIES.forEach(function(cat) {
    var wrapEl = document.getElementById('tagwrap_' + cat.cls + '_tg');
    if (!wrapEl) return;
    var checked = [];
    wrapEl.querySelectorAll('.tcb:checked').forEach(function(cb) { checked.push(cb.value); });
    if (checked.length > 0) tagCategories[cat.cls] = checked;
  });

  return {
    companyName:    document.getElementById('f_co').value.trim(),
    salonName:      document.getElementById('f_sn').value.trim(),
    catchphrase:    (function() {
      var c1 = (document.getElementById('f_catch1').value || '').trim();
      var c2 = (document.getElementById('f_catch2').value || '').trim();
      return c2 ? c1 + '\n' + c2 : c1;
    })(),
    representative: document.getElementById('f_rep').value.trim(),
    established:    document.getElementById('f_est').value,
    stores:         document.getElementById('f_str').value,
    staff:          document.getElementById('f_stf').value,
    address:        (function(){
      var a1 = (document.getElementById('f_addr1').value||'').trim();
      var a2 = (document.getElementById('f_addr2').value||'').trim();
      return a1 + (a2 ? '\n' + a2 : '');
    })(),
    tel:            document.getElementById('f_tel').value.trim(),
    bodyText:       document.getElementById('f_body').value.trim(),
    tags:           tags,
    tagCategories:  tagCategories,
    photo1:         document.getElementById('f_p1_url').value   || document.getElementById('f_p1_local').value,
    photo2:         document.getElementById('f_p2_url').value   || document.getElementById('f_p2_local').value,
    photo3:         '',
    logo:           document.getElementById('f_logo_url').value || document.getElementById('f_logo_local').value,
    instagram:      document.getElementById('f_ig').value.trim(),
    hp:             document.getElementById('f_hp').value.trim(),
    qr1Label:       document.getElementById('f_qr1label') ? document.getElementById('f_qr1label').value.trim() : '',
    qr2Label:       document.getElementById('f_qr2label') ? document.getElementById('f_qr2label').value.trim() : '',
    layout:         '1/3'
  };
}

function doSaveSalon(sid, pid) {
  if (_uploadingCount > 0) {
    alert('画像をDriveにアップロード中です。\n完了（「アップロード完了」表示）してから保存してください。');
    return;
  }
  var data = getFormData();
  if (!data.companyName) { alert('会社名を入力してください'); return; }
  if (!data.salonName)   { alert('サロン名を入力してください'); return; }
  // 本文テキスト200文字チェック
  if (data.bodyText.length > 200) {
    alert('本文テキストは200文字以内で入力してください（現在' + data.bodyText.length + '文字）');
    validateBodyText(); return;
  }
  // 住所1：長音符チェック（全角数字・全角ハイフンは入力時に自動変換済み）
  var addr1El = document.getElementById('f_addr1');
  if (addr1El && /ー/.test(addr1El.value)) {
    alert('番地の数字とハイフンは半角で入力してください（例：3-17-20）');
    validateAddrInput('f_addr1');
    return;
  }
  data.id        = sid || null;
  data.projectId = pid;

  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '保存中...';

  gas('saveSalon', data).then(function() {
    showToast('保存しました'); go('project-detail', { pid: pid });
  }).catch(function(err){
    alert('エラー: ' + err.message);
    btn.disabled = false; btn.innerHTML = ico('save',13) + ' 保存する';
  });
}

function filterSalonSearch(q) {
  var res = document.getElementById('salonSearchResults');
  if (!res) return;
  var all = window._allSalons || [];
  q = (q || '').trim().toLowerCase();

  var hits = all.filter(function(s) {
    var text = ((s.salonName||'') + ' ' + (s.companyName||'')).toLowerCase();
    return !q || text.indexOf(q) !== -1;
  }).slice(0, 30);

  if (hits.length === 0) {
    res.innerHTML = '<div class="ss-empty">' + (q ? '該当するサロンが見つかりません' : '登録済みのサロンがありません') + '</div>';
  } else {
    res.innerHTML = hits.map(function(s) {
      var sub = [s.projectName, s.tel, s.address ? s.address.split('\n')[0] : ''].filter(Boolean).join('　');
      var j   = JSON.stringify(JSON.stringify(s));
      return '<div class="ss-item">' +
        '<div class="ss-item-info">' +
          '<div class="ss-item-name">' + e(s.salonName || '（未設定）') + (s.companyName ? '　<span style="font-weight:400">' + e(s.companyName) + '</span>' : '') + '</div>' +
          (sub ? '<div class="ss-item-sub">' + e(sub) + '</div>' : '') +
        '</div>' +
        '<button class="btn btn-accent btn-xs" style="flex-shrink:0" ' +
          'onmousedown="event.preventDefault();applySalonData(' + j + ')">＋ 流用</button>' +
      '</div>';
    }).join('');
  }
  res.classList.add('open');

  // 検索ボックス外クリックで閉じる（1度だけ登録）
  if (!window._ssCloseHandler) {
    window._ssCloseHandler = function(ev) {
      var inp = document.getElementById('salonSearchInput');
      var r2  = document.getElementById('salonSearchResults');
      if (inp && !inp.contains(ev.target) && r2 && !r2.contains(ev.target)) {
        r2.classList.remove('open');
      }
    };
    document.addEventListener('click', window._ssCloseHandler);
  }
}

function applySalonData(jsonStr) {
  var s;
  try { s = JSON.parse(jsonStr); } catch(err) { return; }

  var map = {
    f_co: 'companyName', f_sn: 'salonName',
    f_rep: 'representative', f_est: 'established', f_str: 'stores',
    f_stf: 'staff', f_tel: 'tel', f_body: 'bodyText',
    f_ig: 'instagram', f_hp: 'hp',
    f_qr1label: 'qr1Label', f_qr2label: 'qr2Label'
  };
  Object.keys(map).forEach(function(elId) {
    var el = document.getElementById(elId);
    if (el) el.value = s[map[elId]] || '';
  });

  // キャッチコピーを1行目/2行目に分割
  var cp = (s.catchphrase || '').split('\n');
  var c1 = document.getElementById('f_catch1'); if (c1) c1.value = cp[0] || '';
  var c2 = document.getElementById('f_catch2'); if (c2) c2.value = cp[1] || '';

  // 住所を addr1/addr2 に分割
  var parts = (s.address || '').split('\n');
  var a1 = document.getElementById('f_addr1');
  var a2 = document.getElementById('f_addr2');
  if (a1) { a1.value = parts[0] || ''; validateAddrInput('f_addr1'); }
  if (a2) { a2.value = parts[1] || ''; validateAddrInput('f_addr2'); }

  // タグ：カスタムタグをlocalStorageに復元してから再レンダリング
  if (s.tagCategories && Object.keys(s.tagCategories).length > 0) {
    var scustom = getCustomTags();
    var schanged = false;
    TAG_CATEGORIES.forEach(function(cat) {
      (s.tagCategories[cat.cls] || []).forEach(function(tag) {
        if (cat.tags.indexOf(tag) === -1) {
          if (!scustom[cat.cls]) scustom[cat.cls] = [];
          if (scustom[cat.cls].indexOf(tag) === -1) { scustom[cat.cls].push(tag); schanged = true; }
        }
      });
    });
    if (schanged) saveCustomTags(scustom);
    var tagCatsEl = document.querySelector('.tag-cats');
    if (tagCatsEl) tagCatsEl.innerHTML = renderTagCheckboxes(s.tags, 'tg');
  } else {
    document.querySelectorAll('.tcb').forEach(function(cb) {
      cb.checked = (s.tags || []).indexOf(cb.value) !== -1;
    });
  }
  updateTagCount('tg');

  // 画像URL（Drive保存済みのもの）
  ['f_p1','f_p2','f_logo'].forEach(function(pfx, i) {
    var urlKey = i === 0 ? 'photo1' : i === 1 ? 'photo2' : 'logo';
    var url    = s[urlKey] || '';
    var urlEl  = document.getElementById(pfx + '_url');
    var locEl  = document.getElementById(pfx + '_local');
    var prevEl = document.getElementById(pfx + '_prev');
    if (urlEl)  urlEl.value  = url;
    if (locEl)  locEl.value  = '';
    if (prevEl) {
      if (url) {
        prevEl.innerHTML =
          '<div class="uz-prev">' +
            '<img src="' + e(fixImgUrl(url)) + '" onerror="this.style.display=\'none\'">' +
            '<div class="uz-prev-info">' +
              '<div class="uz-prev-name">アップロード済み</div>' +
              '<div class="uz-prev-sub">' + e(url.substring(0,40)) + '...</div>' +
            '</div>' +
            '<button class="btn btn-danger btn-xs" type="button" onclick="uzClear(\'' + pfx + '\')">削除</button>' +
          '</div>';
      } else {
        prevEl.innerHTML = '';
      }
    }
  });

  // 検索欄を閉じてフィールド名で表示
  var inp = document.getElementById('salonSearchInput');
  var res = document.getElementById('salonSearchResults');
  if (inp) inp.value = s.salonName || '';
  if (res) res.classList.remove('open');

  showToast((s.salonName || 'サロン') + ' の情報を反映しました');
  validateBodyText();
}

          '</div>' +

function doSaveTemplate(tid) {
  var tags = [].slice.call(document.querySelectorAll('.tcb:checked')).map(function(c){ return c.value; });
  var rl   = document.querySelector('input[name="trl"]:checked');
  var data = {
    id:           tid || null,
    templateName: document.getElementById('tn_name').value.trim(),
    companyName:  document.getElementById('tn_co').value.trim(),
    salonName:    document.getElementById('tn_sn').value.trim(),
    catchphrase:  (function() {
      var c1 = (document.getElementById('tn_catch1').value || '').trim();
      var c2 = (document.getElementById('tn_catch2').value || '').trim();
      return c2 ? c1 + '\n' + c2 : c1;
    })(),
    representative: document.getElementById('tn_rep').value.trim(),
    established:  document.getElementById('tn_est').value,
    stores:       document.getElementById('tn_str').value,
    staff:        document.getElementById('tn_stf').value,
    address:      document.getElementById('tn_addr').value.trim(),
    tel:          document.getElementById('tn_tel').value.trim(),
    bodyText:     document.getElementById('tn_body').value.trim(),
    tags:         tags,
    layout:       rl ? rl.value : '1/2'
  };
  if (!data.templateName) { alert('テンプレート名を入力してください'); return; }

  gas('saveTemplate', data).then(function() {
    closeModal(); showToast('テンプレートを保存しました'); renderTemplates();
  }).catch(function(err){ alert('エラー: ' + err.message); });
}

function delTemplate(id, name) {
  if (!confirm('「' + name + '」を削除しますか？')) return;
  gas('deleteTemplate', id).then(function() {
    showToast('削除しました'); renderTemplates();
  }).catch(function(err){ alert('エラー: ' + err.message); });
}

function switchPrevPid(pid) {
  if (!pid) return;
  ST.prevPid = pid;
  loadPreview(pid);
}

function switchPrevLayout(ly) {
  ST.prevLayout = ly;
  if (ST.prevPid) loadPreview(ST.prevPid);
}

function loadPreview(pid) {
  var el = document.getElementById('pvContent');
  if (!el) return;
  el.innerHTML = '<div class="loading"><div class="spin"></div>生成中...</div>';

  gas('getSalonsByProject', pid).then(function(salons) {
    salons = (salons || []).filter(function(s) { return !s.approachOnly; });
    if (!salons || salons.length === 0) {
      el.innerHTML = '<div class="empty"><div class="empty-ico">' + ico('scissors',48) + '</div><p>サロンが登録されていません</p></div>';
      return;
    }

    var perPage = 3;
    var pages   = '';

    var globalIdx = 0;
    for (var i = 0; i < salons.length; i += perPage) {
      var grp = salons.slice(i, i + perPage);
      while (grp.length < perPage) grp.push(null);
      var cards = (function(grp2, startIdx) {
        return grp2.map(function(s, j) {
          return s ? '<div class="pv-card">' + buildPvCard(s, startIdx + j, '1/3') + '</div>'
                   : '<div class="pv-card pv-empty"></div>';
        }).join('');
      })(grp, globalIdx);
      globalIdx += perPage;
      pages += '<div class="prev-page ly3">' + cards + '</div>';
    }

    el.innerHTML = '<div class="prev-bg">' + pages + '</div>';
    setTimeout(scalePrevPages, 0);
  }).catch(function(err){ el.innerHTML = '<div class="alert a-danger">' + e(err.message) + '</div>'; });
}

function scalePrevPages() {
  var bg = document.querySelector('#pvContent .prev-bg');
  if (!bg) return;
  var avail = bg.clientWidth - 40;
  var scale = Math.min(1, avail / 794);
  document.querySelectorAll('#pvContent .prev-page').forEach(function(p) {
    p.style.transformOrigin = 'top center';
    p.style.transform = 'scale(' + scale + ')';
    p.style.marginBottom = ((1123 * scale) - 1123 + 14) + 'px';
  });
}
window.addEventListener('resize', scalePrevPages);

function loadInlinePreview(pid) {
  var el = document.getElementById('inlinePvContent');
  if (!el) return;
  el.innerHTML = '<div class="loading"><div class="spin"></div>生成中...</div>';

  gas('getSalonsByProject', pid).then(function(salons) {
    salons = (salons || []).filter(function(s) { return !s.approachOnly; });
    if (!salons || salons.length === 0) { el.innerHTML = ''; return; }
    var cards = salons.map(function(s, i) {
      return '<div class="pv-inline-card">' + buildPvCard(s, i, '1/3') + '</div>';
    }).join('');
    el.innerHTML = '<div class="pv-inline-bg">' + cards + '</div>';
    setTimeout(scaleInlinePrevPages, 0);
  }).catch(function(err) { el.innerHTML = '<div class="alert a-danger">' + e(err.message) + '</div>'; });
}

function scaleInlinePrevPages() {
  var bg = document.querySelector('#inlinePvContent .pv-inline-bg');
  if (!bg) return;
  var avail = bg.clientWidth - 40;
  var scale = Math.min(1, avail / 794);
  var cardH = 374;
  var gap = 14;
  document.querySelectorAll('#inlinePvContent .pv-inline-card').forEach(function(c) {
    c.style.transform = 'scale(' + scale + ')';
    c.style.marginBottom = ((cardH * scale) - cardH + gap) + 'px';
  });
  bg.style.paddingBottom = (20 + gap) + 'px';
}
window.addEventListener('resize', scaleInlinePrevPages);

function getTagColor(tag, tagCategories) {
  // 保存済みカテゴリ情報を優先的に使用（カスタムタグの色を正確に反映）
  if (tagCategories) {
    var catColorMap = { 'cat-area': 'c-blue', 'cat-job': 'c-pink', 'cat-feature': 'c-green' };
    var catKeys = Object.keys(catColorMap);
    for (var ci = 0; ci < catKeys.length; ci++) {
      if ((tagCategories[catKeys[ci]] || []).indexOf(tag) !== -1) return catColorMap[catKeys[ci]];
    }
  }
  // localStorageのカスタムタグを参照
  var custom = getCustomTags();
  for (var i = 0; i < TAG_CATEGORIES.length; i++) {
    var cat     = TAG_CATEGORIES[i];
    var allTags = cat.tags.concat(custom[cat.cls] || []);
    if (allTags.indexOf(tag) !== -1) {
      if (cat.cls === 'cat-area')    return 'c-blue';
      if (cat.cls === 'cat-job')     return 'c-pink';
      if (cat.cls === 'cat-feature') return 'c-green';
    }
  }
  return 'c-grey';
}

function buildPvCard(s, idx, layout) {
  var num = String((idx || 0) + 1).padStart(2, '0');
  var is13 = (layout || s.layout) === '1/3';

  // ヘッダー
  var titleParts = [];
  if (s.companyName) titleParts.push(e(s.companyName));
  if (s.salonName)   titleParts.push(e(s.salonName));
  var titleHtml = titleParts.join('<span style="margin:0 2px;color:#aaa"> / </span>');

  var logoHtml = s.logo
    ? '<img src="' + e(fixImgUrl(s.logo)) + '" onerror="this.style.display=\'none\'">'
    : '<span style="font-size:5px;color:#bbb">LOGO</span>';

  // タグ（8枠固定）
  var tagsHtml = '';
  for (var t = 0; t < 8; t++) {
    var tval = s.tags && s.tags[t] ? s.tags[t] : '';
    tagsHtml += tval
      ? '<div class="pv2-tag">' + e(tval) + '</div>'
      : '<div class="pv2-tag empty">&nbsp;</div>';
  }

  // QRコード（Instagram / HP / 予約枠）
  var qrDefs = [
    { label: 'Instagram', url: s.instagram },
    { label: 'HP',        url: s.hp },
    { label: '予約/MAP',  url: '' }
  ];
  var qrHtml = qrDefs.map(function(q) {
    var inner = q.url
      ? '<img src="https://api.qrserver.com/v1/create-qr-code/?size=735x735&data=' + encodeURIComponent(q.url) + '" style="width:100%;height:100%;display:block;object-fit:cover" alt="QR">'
      : '';
    return '<div class="pv2-qr-item">' +
      '<div class="pv2-qr-box' + (q.url ? ' filled' : '') + '">' + inner + '</div>' +
      '<div class="pv2-qr-label">' + e(q.label) + '</div>' +
    '</div>';
  }).join('');

  // 4つの特徴（タグ先頭4件 or プレースホルダー）
  var featHtml = '';
  for (var f = 0; f < 4; f++) {
    var fval = s.tags && s.tags[f] ? s.tags[f].slice(0, 12) : '';
    featHtml += fval
      ? '<div class="pv2-feat">' + e(fval) + '</div>'
      : '<div class="pv2-feat empty">特徴' + (f + 1) + '</div>';
  }

  // 基本情報テーブル
  var infoData = [
    { lbl: '代表',     val: s.representative },
    { lbl: '設立',     val: s.established ? s.established + '年' : '' },
    { lbl: '店舗数',   val: s.stores      ? s.stores      + '店舗' : '' },
    { lbl: 'スタッフ', val: s.staff       ? s.staff       + '名' : '' },
    { lbl: '住所',     val: s.address },
    { lbl: 'TEL',      val: s.tel }
  ].filter(function(r){ return r.val; });
  var infoHtml = infoData.map(function(r) {
    if (r.val.indexOf('\n') !== -1) {
      var parts = r.val.split('\n').filter(Boolean);
      return '<div class="pv2-info-row">' +
        '<span class="pv2-info-lbl">' + e(r.lbl) + '</span>' +
        '<span class="pv2-info-val-multi">' + parts.map(function(p){ return e(p); }).join('<br>') + '</span>' +
      '</div>';
    }
    return '<div class="pv2-info-row">' +
      '<span class="pv2-info-lbl">' + e(r.lbl) + '</span>' +
      '<span class="pv2-info-val">' + e(r.val) + '</span>' +
    '</div>';
  }).join('');

  // 写真
  var mainPhotoHtml = s.photo1
    ? '<img src="' + e(fixImgUrl(s.photo1)) + '" onerror="this.style.display=\'none\'">'
    : '<div class="pv2-main-ph">写真1</div>';

  // 右カラム：写真2・3の有無に応じて表示を切り替え
  var rightColHtml = '';
  if (s.photo2 && s.photo3) {
    // 2枚とも登録済み → 各50%
    rightColHtml =
      '<div class="pv2-photo"><img src="' + e(fixImgUrl(s.photo2)) + '" onerror="this.style.display=\'none\'"></div>' +
      '<div class="pv2-photo"><img src="' + e(fixImgUrl(s.photo3)) + '" onerror="this.style.display=\'none\'"></div>';
  } else if (s.photo2) {
    // 写真2のみ → 全幅
    rightColHtml =
      '<div class="pv2-photo"><img src="' + e(fixImgUrl(s.photo2)) + '" onerror="this.style.display=\'none\'"></div>' +
      '<div class="pv2-photo-ph">写真3</div>';
  } else {
    // 未登録 → どちらもプレースホルダー
    rightColHtml =
      '<div class="pv2-photo-ph">写真2</div>' +
      '<div class="pv2-photo-ph">写真3</div>';
  }

  // ── 共通ヘッダー
  var headerHtml =
    '<div class="pv2-head">' +
      '<div class="pv2-num">' + num + '</div>' +
      '<div class="pv2-title">' + titleHtml + '</div>' +
      '<div class="pv2-catch">' + e(s.catchphrase || '') + '</div>' +
      '<div class="pv2-logo">' + logoHtml + '</div>' +
    '</div>';

  if (is13) {
    // タイトル（会社名 / サロン名）
    var titleParts3 = [];
    if (s.companyName) titleParts3.push(e(s.companyName));
    if (s.salonName)   titleParts3.push(e(s.salonName));
    var title3 = titleParts3.join('<span style="margin:0 2px;color:#aaa"> / </span>');

    // ロゴ
    var logo3 = s.logo
      ? '<img src="' + e(fixImgUrl(s.logo)) + '" onerror="this.style.display=\'none\'">'
      : '<span style="font-size:5px;color:#bbb">LOGO</span>';

    // 写真1
    var ph1 = s.photo1
      ? '<img class="pv3-photo1-img" src="' + e(fixImgUrl(s.photo1)) + '" onerror="this.style.display=\'none\'">'
      : '<div class="pv3-photo1-ph">写真1</div>';

    // 写真2
    var ph2 = s.photo2
      ? '<img class="pv3-photo2-img" src="' + e(fixImgUrl(s.photo2)) + '" onerror="this.style.display=\'none\'">'
      : '<div class="pv3-photo2-ph">写真2</div>';

    // タグ：2行×5列（10枠固定）・色分けあり
    var tagsGrid3 = '';
    for (var ti = 0; ti < 10; ti++) {
      var tv = s.tags && s.tags[ti] ? s.tags[ti] : '';
      tagsGrid3 += tv
        ? '<div class="pv3-tag ' + getTagColor(tv, s.tagCategories) + '">' + e(tv) + '</div>'
        : '<div class="pv3-tag empty"></div>';
    }

    // QR（1/3は2個）
    var qrDefs3 = [
      { label: s.qr1Label || 'Instagram', url: s.instagram },
      { label: s.qr2Label || 'HP',        url: s.hp }
    ];
    var qr3Html = qrDefs3.map(function(q) {
      var inner = q.url
        ? '<img src="https://api.qrserver.com/v1/create-qr-code/?size=735x735&data=' + encodeURIComponent(q.url) + '" style="width:100%;height:100%;display:block;object-fit:cover" alt="QR">'
        : '';
      return '<div class="pv3-qr-item">' +
        '<div class="pv3-qr-box' + (q.url ? ' filled' : '') + '">' + inner + '</div>' +
        '<div class="pv3-qr-label">' + e(q.label) + '</div>' +
      '</div>';
    }).join('');

    // 会社情報（サロン名・代表者名・設立・店舗数・スタッフ数・住所・電話番号）
    var infoRows3 = [
      { lbl: 'サロン名', val: s.salonName },
      { lbl: '代表者名', val: s.representative },
      { lbl: '設立',     val: s.established ? s.established + '年' : '',
                         twin: s.staff ? { lbl: 'スタッフ数', val: s.staff + '名' } : null },
      { lbl: '店舗数',   val: s.stores ? s.stores + '店舗' : '' },
      { lbl: '住所',     val: s.address },
      { lbl: '電話番号', val: s.tel }
    ].filter(function(r){ return r.val || (r.twin && r.twin.val); });
    var info3Html = infoRows3.map(function(r) {
      var val = r.val || '';
      if (val.indexOf('\n') !== -1) {
        var parts = val.split('\n').filter(Boolean);
        return '<div class="pv3-info-row pv3-info-row-wrap">' +
          '<span class="pv3-info-lbl">【' + e(r.lbl) + '】</span>' +
          '<span class="pv3-info-val-multi">' + parts.map(function(p){ return e(p); }).join('<br>') + '</span>' +
        '</div>';
      }
      var html = '<div class="pv3-info-row">';
      if (val) html += '<span class="pv3-info-lbl">【' + e(r.lbl) + '】</span><span class="pv3-info-val">' + e(val) + '</span>';
      if (r.twin && r.twin.val) {
        html += '<span class="pv3-info-lbl" style="margin-left:5px">【' + e(r.twin.lbl) + '】</span>' +
                '<span class="pv3-info-val">' + e(r.twin.val) + '</span>';
      }
      return html + '</div>';
    }).join('');

    return '<div class="pv2">' +
      // ヘッダー（1行）：num + 会社名/サロン名 + ロゴ
      '<div class="pv3-head">' +
        '<div class="pv3-num">' + num + '</div>' +
        '<div class="pv3-hd-title">' + title3 + '</div>' +
        '<div class="pv3-hd-logo">' + logo3 + '</div>' +
      '</div>' +
      // ボディ：縦2段
      '<div class="pv3-body">' +
        // ── 上段：キャッチ（左）＋ スペーサー+タグ（中央）
        '<div class="pv3-upper">' +
          '<div class="pv3-upper-left"><div class="pv3-catch">' + e(s.catchphrase || '') + '</div></div>' +
          '<div class="pv3-upper-center">' +
            '<div class="pv3-center-spacer"></div>' +
            '<div class="pv3-tags-grid">' + tagsGrid3 + '</div>' +
          '</div>' +
        '</div>' +
        // ── 下段：写真1（左）＋ 説明文+会社情報（中央）＋ 写真2+QR（右）
        '<div class="pv3-lower">' +
          '<div class="pv3-lower-left"><div class="pv3-photo1-wrap">' + ph1 + '</div></div>' +
          '<div class="pv3-lower-center">' +
            '<div class="pv3-desc">' + (s.bodyText ? e(s.bodyText.slice(0, 200)) : '<span style="color:#ccc">説明文</span>') + '</div>' +
            (info3Html ? '<div class="pv3-info">' + info3Html + '</div>' : '<div style="margin-top:auto"></div>') +
          '</div>' +
          '<div class="pv3-lower-right">' +
            '<div class="pv3-photo2-wrap">' + ph2 + '</div>' +
            '<div class="pv3-qrs">' + qr3Html + '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  return '<div class="pv2">' +
    headerHtml +
    // ── ボディ（1/2レイアウト）
    '<div class="pv2-body">' +
      // 左
      '<div class="pv2-left">' +
        '<div class="pv2-main-photo">' + mainPhotoHtml + '</div>' +
        '<div class="pv2-tags-grid">' + tagsHtml + '</div>' +
        '<div class="pv2-qrs">' + qrHtml + '</div>' +
      '</div>' +
      // 中央
      '<div class="pv2-mid">' +
        '<div class="pv2-bodytext">' + (s.bodyText ? e(s.bodyText.slice(0, 200)) : '<span style="color:#ccc">説明文</span>') + '</div>' +
        '<div class="pv2-features">' + featHtml + '</div>' +
        (infoHtml ? '<div class="pv2-info-tbl">' + infoHtml + '</div>' : '') +
      '</div>' +
      // 右
      '<div class="pv2-right">' + rightColHtml + '</div>' +
    '</div>' +
  '</div>';
}

      }).join('');

    document.getElementById('content').innerHTML =
      '<div class="card">' +
        '<div class="card-head"><div class="card-title">' + ico('file',14) + ' CSV出力（InDesign データ結合用）</div></div>' +
        '<div class="card-body">' +
          '<div class="alert a-info mb16">フィールド名は <strong>@フィールド名_番号</strong> 形式で出力されます。InDesignのデータ結合にそのままご利用いただけます。</div>' +
          '<div class="fg"><label class="flabel req">案件</label><select class="finput" id="csvPid" style="max-width:420px">' + opts + '</select></div>' +
          '<div class="divider"></div>' +
          '<button class="btn btn-success" onclick="doExportCSV()">' + ico('download',13) + ' CSVをダウンロード</button>' +
        '</div>' +
      '</div>';
  }).catch(function(err){ showErr(err); });
}

function doExportCSV() {
  var pid = document.getElementById('csvPid').value;
  if (!pid) { alert('案件を選択してください'); return; }
  var layout = '1/3';

  gas('exportCSV', pid, layout).then(function(result) {
    var proj = ST.projects.find(function(p){ return p.id === pid; });
    var filename = proj ? proj.year + '_' + proj.month + (proj.day||'') + '_' + proj.name + '_1-3.csv' : 'salon.csv';
    var blob = new Blob([result.csv], { type: 'text/csv;charset=utf-8' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href   = url;
    a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('CSVをダウンロードしました');
  }).catch(function(err){ alert('エラー: ' + err.message); });
}

// =====================================================
// アップロード中カウンター
// =====================================================
var _uploadingCount = 0;

// =====================================================
// Google Drive URLを埋め込み用に変換
// =====================================================
function fixImgUrl(url) {
  if (!url) return url;
  // uc?export=view&id=FILE_ID 形式を lh3 形式に変換
  var m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  // /file/d/FILE_ID/... 形式を lh3 形式に変換
  var m2 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1];
  return url;
}

// =====================================================
// 画像アップロード
// =====================================================
function uzHtml(id, label, currentUrl, hint) {
  var prev = currentUrl
    ? '<div class="uz-prev" id="' + id + '_prev">' +
        '<img src="' + e(fixImgUrl(currentUrl)) + '" onerror="this.style.display=\'none\'">' +
        '<div class="uz-prev-info">' +
          '<div class="uz-prev-name">アップロード済み</div>' +
          '<div class="uz-prev-sub">' + e(currentUrl.substring(0,40)) + '...</div>' +
        '</div>' +
        '<button class="btn btn-danger btn-xs" type="button" onclick="uzClear(\'' + id + '\')">削除</button>' +
      '</div>'
    : '<div id="' + id + '_prev"></div>';

  return '<div class="fg">' +
    '<label class="flabel">' + e(label) + (hint ? '<span style="font-weight:400;color:var(--muted);font-size:11px;margin-left:6px">' + e(hint) + '</span>' : '') + '</label>' +
    '<input type="hidden" id="' + id + '_url"   value="' + e(currentUrl||'') + '">' +
    '<input type="hidden" id="' + id + '_local" value="">' +
    '<div class="uz-zone" id="' + id + '_zone"' +
      ' onclick="document.getElementById(\'' + id + '_file\').click()"' +
      ' ondragover="event.preventDefault();this.classList.add(\'drag\')"' +
      ' ondragleave="this.classList.remove(\'drag\')"' +
      ' ondrop="uzDrop(event,\'' + id + '\')">' +
      '<input type="file" id="' + id + '_file" accept="image/*" onchange="uzSelect(event,\'' + id + '\')">' +
      '<div class="uz-ico">' + ico('image',28) + '</div>' +
      '<div class="uz-txt">ドラッグ＆ドロップ　または</div>' +
      '<button class="btn btn-ghost btn-sm" type="button">ファイルを選択</button>' +
    '</div>' +
    prev +
    '<div id="' + id + '_status"></div>' +
  '</div>';
}

function uzDrop(event, id) {
  event.preventDefault();
  document.getElementById(id + '_zone').classList.remove('drag');
  var file = event.dataTransfer.files[0];
  if (file) uzProcess(file, id);
}

function uzSelect(event, id) {
  var file = event.target.files[0];
  if (file) uzProcess(file, id);
}

function uzProcess(file, id) {
  if (!file.type.startsWith('image/')) { alert('画像ファイル（JPG・PNG・GIF等）を選択してください'); return; }

  var fr1 = new FileReader();
  fr1.onload = function(ev) {
    document.getElementById(id + '_local').value = ev.target.result;
    document.getElementById(id + '_prev').innerHTML =
      '<div class="uz-prev">' +
        '<img src="' + ev.target.result + '">' +
        '<div class="uz-prev-info">' +
          '<div class="uz-prev-name">' + e(file.name) + '</div>' +
          '<div class="uz-prev-sub">' + (file.size > 1024*1024 ? (file.size/1024/1024).toFixed(1)+'MB' : Math.round(file.size/1024)+'KB') + '</div>' +
        '</div>' +
        '<button class="btn btn-danger btn-xs" type="button" onclick="uzClear(\'' + id + '\')">削除</button>' +
      '</div>';
    document.getElementById(id + '_status').innerHTML =
      '<div class="uz-uploading"><div class="spin" style="width:14px;height:14px;border-width:2px"></div>Driveにアップロード中...</div>';
  };
  fr1.readAsDataURL(file);

  var fr2 = new FileReader();
  fr2.onload = function(ev) {
    var base64 = ev.target.result.split(',')[1];
    var pid    = ST.projectId || '';
    var sname  = (document.getElementById('f_sn') && document.getElementById('f_sn').value) || '未設定';

    _uploadingCount++;
    gas('uploadImage', base64, file.name, file.type, pid, sname, id)
      .then(function(result) {
        _uploadingCount--;
        document.getElementById(id + '_url').value   = result.url;
        document.getElementById(id + '_local').value = ''; // base64をクリア（スプレッドシート上限対策）
        document.getElementById(id + '_status').innerHTML =
          '<div style="font-size:11px;color:var(--success);margin-top:6px">&#10003; アップロード完了</div>';
      })
      .catch(function(err) {
        _uploadingCount--;
        document.getElementById(id + '_status').innerHTML =
          '<div style="font-size:11px;color:var(--danger);margin-top:6px">&#9651; ' + e(err.message) + '</div>';
      });
  };
  fr2.readAsDataURL(file);
}

function uzClear(id) {
  document.getElementById(id + '_url').value        = '';
  document.getElementById(id + '_local').value      = '';
  document.getElementById(id + '_prev').innerHTML   = '';
  document.getElementById(id + '_status').innerHTML = '';
  var fi = document.getElementById(id + '_file');
  if (fi) fi.value = '';
}

// =====================================================
// エラー表示
// =====================================================
function showErr(err) {
  var msg = err && err.message ? err.message : String(err);
  document.getElementById('content').innerHTML =
    '<div class="alert a-danger">&#9651; エラー: ' + e(msg) + '</div>';
}

// =====================================================
// 起動
// =====================================================
window.onload = function() {
  // 起動時の双方向タグ同期（GAS ↔ localStorage）
  // ・他PCで追加されたタグをGASから取得してlocalに反映
  // ・このPCのlocalにあってGASにないタグをGASに反映（過去データの移行も自動）
  gas('getGlobalCustomTags').then(function(gasCustom) {
    gasCustom = gasCustom || {};
    var local = getCustomTags();
    var merged = {};
    var allKeys = Object.keys(gasCustom).concat(Object.keys(local).filter(function(k){ return !(k in gasCustom); }));
    allKeys.forEach(function(key) {
      var gasTags   = gasCustom[key] || [];
      var localTags = local[key]    || [];
      merged[key]   = gasTags.concat(localTags.filter(function(t){ return gasTags.indexOf(t) === -1; }));
    });
    saveCustomTags(merged);

    // ローカルにGASへ未登録のタグがあればGASにも保存（初回・過去データの自動移行）
    var needsSync = Object.keys(local).some(function(key) {
      return (local[key] || []).some(function(tag) {
        return (gasCustom[key] || []).indexOf(tag) === -1;
      });
    });
    if (needsSync) gas('saveGlobalCustomTags', merged).catch(function() {});
  }).catch(function() {});

  var saved;
  try {
    var raw = localStorage.getItem('_appState');
    if (raw) saved = JSON.parse(raw);
  } catch(e) {}
  if (saved && saved.v) {
    go(saved.v, saved.p || {});
  } else {
    go('dash');
  }
};
</script>
